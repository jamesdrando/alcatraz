services:
  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
      args:
        UID: ${AGENT_UID:-1000}
        GID: ${AGENT_GID:-1000}
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      HOME: /home/agent
      CODEX_HOME: /home/agent/.codex
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      ALL_PROXY: http://egress-proxy:3128
      NO_PROXY: localhost,127.0.0.1,egress-proxy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m
      - /run:rw,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 4g
    cpus: 4
    volumes:
      - ${ALCATRAZ_WORKSPACE:-.}:/workspace
      - agent-home:/home/agent
    networks:
      - agent-net
    depends_on:
      egress-proxy:
        condition: service_started

  egress-proxy:
    build:
      context: .
      dockerfile: docker/egress-proxy/Dockerfile
    environment:
      SQUID_ALLOWED_DOMAINS: ${SQUID_ALLOWED_DOMAINS:-api.openai.com chatgpt.com auth.openai.com files.oaiusercontent.com deb.debian.org security.debian.org registry.npmjs.org pypi.org files.pythonhosted.org crates.io index.crates.io static.crates.io bun.com bun.sh}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    expose:
      - "3128"
    networks:
      - agent-net
      - internet

volumes:
  agent-home:

networks:
  agent-net:
    internal: true
  internet:
